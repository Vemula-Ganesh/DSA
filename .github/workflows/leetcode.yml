name: LeetCode Sync

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Install Libraries
        run: pip install requests PyGithub

      - name: Run Script
        run: python sync.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
